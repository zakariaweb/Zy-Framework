name: ZyUI Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump (patch|minor|major)"
        required: true
        default: "patch"

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org/"

      - name: Install
        run: npm ci

      - name: Build And Sync
        run: npm run build:css && npm run build:js && npm run zyui:sync

      - name: Bump Version
        run: npm run zyui:version:${{ inputs.bump }}

      - name: Publish
        run: npm --prefix packages/zyui publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
